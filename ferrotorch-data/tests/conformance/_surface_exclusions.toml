tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::current_worker_mode"
reason = "Accessor returning the WorkerMode set by worker_mode(). Proven by WorkerMode conformance test that sets and reads back the value."
tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::is_pin_memory"
reason = "Accessor returning the pin_memory flag. Proven by the pin_memory builder test in conformance_data_loader.rs."
tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::is_empty"
reason = "Trivial predicate (len() == 0). Proven by the empty-dataset / zero-batches num_batches fixture test."
tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::device"
reason = "Builder method that sets device transfer. GPU path requires CUDA hardware; single-worker CPU-only conformance pass. Device transfer correctness is tracked under the GPU conformance issue."
tracking_issue = "#841"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::pin_memory"
reason = "Builder method enabling pinned host memory for CPU→GPU transfers. Requires CUDA hardware. Tested by is_pin_memory accessor conformance; functional GPU path tracked separately."
tracking_issue = "#841"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::num_workers"
reason = "Builder method setting thread-pool size. CrossBatch multi-worker path is cascade-skipped. IntraBatch rayon parallelism changes performance not output; correct output is verified by sequential conformance."
tracking_issue = "#839"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::prefetch_factor"
reason = "Builder method setting prefetch buffer depth. Prefetch path is tested transitively (default prefetch_factor=2 is active for all loader conformance tests); the builder itself has no PyTorch analog."
tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoader <D>::worker_mode"
reason = "Builder method selecting IntraBatch vs CrossBatch parallelism. CrossBatch is cascade-skipped (#839); IntraBatch is the default under all loader conformance tests."
tracking_issue = "#839"

