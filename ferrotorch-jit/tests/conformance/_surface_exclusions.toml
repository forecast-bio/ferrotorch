note = "Covered by conformance_jit_error_variants.rs (Sprint A.4 / #884): InductorBackend::compile() with GpuCuda/GpuPtx targets fires this variant without a physical GPU. Both #[cfg(feature=\"cuda\")] and #[cfg(not(feature=\"cuda\"))] paths are exercised."

[[exclusion]]
