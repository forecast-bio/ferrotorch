# ── io: file-backed functions ─────────────────────────────────────────────────
# read_image, read_image_rgba, read_image_as_tensor, write_image, write_tensor_as_image
# require actual image files on disk. tensor_to_raw_image and raw_image_to_tensor
# are pure functions exercised by fixtures. File I/O functions are tested with
# tempfiles in conformance_vision_io.rs but diverge from fixture pattern.

[[exclusion]]
path = "ferrotorch_vision::write_image"
reason = "write_image requires tempfile + round-trip; tested in conformance_vision_io.rs but is not fixture-driven. Tracked in #882."
tracking_issue = "#871"

[[exclusion]]
path = "ferrotorch_vision::write_tensor_as_image"
reason = "write_tensor_as_image requires tempfile; tested in conformance_vision_io.rs but not fixture-driven. Tracked in #882."
tracking_issue = "#871"

# ── transforms: stochastic transforms ─────────────────────────────────────────
# Transforms with inherent stochasticity (ColorJitter, RandomResizedCrop,
# RandomRotation, RandomCrop, RandomHorizontalFlip, RandomVerticalFlip,
# RandomGaussianBlur, RandomApply, RandomChoice, ElasticTransform,
# GaussianNoise, TrivialAugmentWide) cannot produce bit-exact reference
# fixtures because their per-call random draws differ from PyTorch's RNG
# state. They are tested in conformance_vision_transforms.rs with:
#   (a) seeded determinism tests (zero-variance case)
#   (b) output contract tests (shape, range, dtype)
# Full stochastic parity is tracked per-transform.

[[exclusion]]
path = "ferrotorch_vision::transforms::ElasticTransform::new"
reason = "Stochastic transform; deterministic contract tested (shape/range). RNG parity with torchvision tracked in #883."
tracking_issue = "#872"

[[exclusion]]
path = "ferrotorch_vision::transforms::GaussianNoise::new"
reason = "Stochastic transform; zero-std deterministic case tested. RNG parity with torchvision tracked in #883."
tracking_issue = "#872"

[[exclusion]]
path = "ferrotorch_vision::transforms::TrivialAugmentWide::new"
reason = "Stochastic transform; seeded output contract tested. Full op-space parity with torchvision tracked in #883."
tracking_issue = "#872"
