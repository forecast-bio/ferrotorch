[[exclusion]]
path = "ferrotorch_cubecl::compute_token_mask_dfa_to_gpu"
reason = "GPU DFA token-mask launcher; requires an active cubecl Runtime to call. Exercised by the inline CUDA runtime tests in grammar.rs. A fixture-based conformance test would need a live backend; cascade-skip pending GPU CI. DfaMaskInputs::new constructor validation is covered in conformance_cubecl.rs."
tracking_issue = "#860"

[[exclusion]]
path = "ferrotorch_cubecl::kernel_compute_token_mask_dfa"
reason = "A #[cube] kernel function expanded by the cubecl macro. The kernel is the implementation detail behind compute_token_mask_dfa_to_gpu; the re-exported symbol is the cubecl generated launcher struct, not callable directly in host code. Contract exercised through compute_token_mask_dfa_to_gpu."
tracking_issue = "#860"
