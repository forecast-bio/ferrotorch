# ── B/C. Iterator / multi-worker infrastructure ─────────────────────────────

[[exclusion]]
path = "ferrotorch_data::dataloader::BatchIter"
reason = "Enum returned by DataLoader::iter selecting between Sync/Prefetch/MultiWorker variants. Tested transitively through all DataLoader::iter conformance tests. No direct PyTorch analog for the iterator enum itself."
tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::PrefetchIter"
reason = "Internal iterator type returned by DataLoader::iter when prefetch_factor > 0. Tested transitively through DataLoader::iter conformance. No direct PyTorch analog for the iterator type itself."
tracking_issue = "#838"

[[exclusion]]
path = "ferrotorch_data::dataloader::MultiWorkerIter"
reason = "Multi-worker iterator returned by DataLoader::iter in CrossBatch mode. Multi-worker mode requires OS thread spawning; cascade-skip with reason 'multi-worker requires OS process spawning, single-worker conformance only'. Tracked for future cross-batch conformance."
tracking_issue = "#839"

[[exclusion]]
path = "ferrotorch_data::dataloader::DataLoaderIter"
reason = "Internal synchronous iterator struct returned via BatchIter::Sync. Tested transitively through DataLoader::iter with prefetch_factor=0. No direct PyTorch analog for the iterator type."
tracking_issue = "#838"

[[exclusion]]
