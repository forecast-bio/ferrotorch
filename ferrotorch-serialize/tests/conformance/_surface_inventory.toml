# ferrotorch-serialize public surface inventory (Layer 1).
#
# Tracking issue: #857 — ferrotorch-serialize conformance suite.
# Reference: torch == 2.11.0, safetensors == 0.4.x
#
# This file enumerates every public item exported by ferrotorch-serialize.
# It is the "denominator" for the Layer 4 strict surface-coverage gate.
# Regenerate by inspecting ferrotorch-serialize/src/*.rs for `pub` items.
#
# Format: [[item]] entries with:
#   path      — crate-relative qualified path
#   kind      — "fn" | "method" | "type_alias" | "struct" | "enum" | "re_export"
#   signature — short human-readable signature (not parsed by the gate)
#
# Items are grouped by source module.
# Inventory date: 2026-05-07
# Crate: ferrotorch-serialize

crate = "ferrotorch_serialize"
description = "Public API surface of ferrotorch-serialize, sized against torch.save/torch.load and safetensors."

