# ferrotorch-vision surface exclusions
# Items listed here are intentionally excluded from the strict conformance gate.
# Each entry requires: path, reason, tracking_issue.
#
# tracking_issue must be #NNN or a full https:// URL — "TBD"/"pending"/etc. fail the gate.

# ── models: large architecture constructors ───────────────────────────────────
# Full forward-pass conformance for large model architectures requires running
# the pretrained torchvision model, which in turn requires downloading pretrained
# weights. These are excluded from Layer 3 fixture-based testing and tracked
# for a dedicated model-parity sweep. The smoke tests in conformance_vision_models.rs
# cover construction, parameter count, and output shape.

[[exclusion]]
path = "ferrotorch_vision::models::ConvNeXt"
reason = "Architecture smoke-tested via convnext_tiny constructor test. Full forward-pass fixture requires pretrained weights download — tracked separately."
tracking_issue = "#861"

