[[exclusion]]
path = "ferrotorch_gpu::stream::CudaEventWrapper::elapsed_ms"
reason = "structural"
note = "Timing wrapper; exercised by elapsed_us test which delegates to elapsed_ms."

[[exclusion]]
path = "ferrotorch_gpu::stream::StreamPool::get_priority_stream"
reason = "structural"
note = "Covered by priority_pool_caches_streams conformance test."

[[exclusion]]
path = "ferrotorch_gpu::stream::StreamPool::priority_pool_size"
reason = "structural"
note = "Covered by priority pool conformance test."

# ---------------------------------------------------------------------------
# C8.1 — device non-primary methods
# fork_for_capture, context, default_stream, blas are accessors exercised
