# C7.2 — codegen internals with live-env requirements
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_jit::codegen_gpu::GpuCodegen"
reason = "live-env"
note = "GPU codegen requires the `cuda` feature and an NVIDIA device. Covered in f64_libdevice_correctness.rs under #[cfg(feature = \"cuda\")]."

[[exclusion]]
path = "ferrotorch_jit::codegen_jit::JitCompiledKernel"
reason = "structural"
note = "Opaque kernel handle. Exercised implicitly by compile_loop_ir_kernel tests in C7.2."

[[exclusion]]
path = "ferrotorch_jit::codegen_jit::compile_loop_ir_kernel"
reason = "structural"
note = "Low-level JIT compilation entry point. Exercised via TracedModule / compile in C7.2."

[[exclusion]]
path = "ferrotorch_jit::module::AotCompiledModule::backward"
reason = "structural"
note = "AoT backward graph. Covered implicitly by AotCompiledModule round-trip tests."

[[exclusion]]
path = "ferrotorch_jit::module::AotCompiledModule::saved_tensor_indices"
