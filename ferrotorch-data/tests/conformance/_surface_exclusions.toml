# Strict coverage-gate exclusions for the ferrotorch-data conformance suite.
#
# Format: `[[exclusion]]` table-array entries with three required fields:
#   path           — fully qualified item path as written in `_surface.json`
#   reason         — one or more sentences (not a placeholder)
#   tracking_issue — `#NNN` (crosslink convention) or full GitHub URL
#
# Conformance phase covers:
#   dataset, sampler, dataloader (single-worker), collate, transforms
#
# Items excluded below fall into these categories:
#   A. Crate-level re-exports — implicit coverage via the sub-module item
#      (the re-export adds no new behaviour; the module item is tested).
#   B. Iterator/wrapper types returned by DataLoader — their behaviour is
#      tested transitively through DataLoader::iter / iter_collated.
#   C. Multi-worker infrastructure (MultiWorkerIter, CrossBatch) — requires
#      OS process or thread-pool spawning not suitable for single-worker
#      conformance; cascade-skip filed.
#   D. Arrow/Polars interop (feature-gated `interop` module) — requires
#      the `arrow` feature enabled and Arrow/Polars installed; out of scope
#      for the default-feature conformance pass.
#   E. DataLoaderIter internal struct — returned only via BatchIter; tested
#      transitively through DataLoader::iter in single-worker sync path.
#   F. ToDevice trait — a user-implementable extension point; blanket impl
#      on Tensor<T> is tested via the device-transfer path; the trait itself
#      has no reference fixture.
#   G. Builder methods on DataLoader that mirror PyTorch kwargs —
#      shuffle, drop_last, seed, num_workers, prefetch_factor, pin_memory,
#      with_sampler, with_collate are exercised through the loader
#      conformance tests that set these and verify output. Explicit
#      per-getter conformance tests (collate_fn, current_worker_mode,
#      is_pin_memory, is_empty) are implicit coverage via DataLoader tests.
#   H. MappedDataset — a higher-order adapter with no direct PyTorch analog
#      (PyTorch uses lambda datasets inline); tested via internal unit tests.
#   I. DistributedSampler builder methods (shuffle/seed) — builder pattern
#      tested through DistributedSampler conformance; individual builders
#      have no separate PyTorch fixture.

