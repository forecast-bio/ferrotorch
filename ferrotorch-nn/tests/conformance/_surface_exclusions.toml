# Surface exclusions for ferrotorch-nn conformance suite (C9.1 — Basic Layers).
#
# Each entry records an item from _surface_inventory.toml that does NOT
# require a direct named reference in a conformance_nn_layers.rs test,
# along with a documented reason.
#
# Valid reasons:
#   structural   — implicitly exercised by every test that uses the surrounding
#                  struct/trait; individual naming adds no extra signal.
#   implicit     — covered transitively by tests of a higher-level function.
#   live-env     — requires running CUDA hardware; cascade-skipped without GPU.
#   deferred     — confirmed out-of-scope for C9.1; tracked in a follow-up phase.
#   rng          — involves non-deterministic output by design; asserted via
#                  distribution moments or train/eval behaviour only.

# ---------------------------------------------------------------------------
# linear — pub fields are exercised transitively by every parameter access
# test; naming them individually adds no conformance signal.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_nn::linear::Linear::weight"
reason = "structural"
note = "Accessed and mutated by forward, named_parameters, and state_dict tests."

[[exclusion]]
path = "ferrotorch_nn::linear::Linear::bias"
reason = "structural"
note = "Accessed and mutated by forward, named_parameters, and state_dict tests."

[[exclusion]]
