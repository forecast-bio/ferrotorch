# ferrotorch-vision public surface inventory (Layer 1).
#
# Tracking issue: #870 — ferrotorch-vision conformance suite.
# Reference: torch == 2.11.0, torchvision == 0.21.0
#
# This file enumerates every public item exported by ferrotorch-vision.
# It is the "denominator" for the Layer 4 strict surface-coverage gate.
#
# Format: [[item]] entries with:
#   path      — crate-relative qualified path
#   kind      — "fn" | "method" | "type_alias" | "struct" | "enum" | "re_export" | "constant"
#   signature — short human-readable signature (not parsed by the gate)
#
# Inventory date: 2026-05-07
# Crate: ferrotorch_vision

crate = "ferrotorch_vision"
description = "Public API surface of ferrotorch-vision, sized against torchvision 0.21.0."

