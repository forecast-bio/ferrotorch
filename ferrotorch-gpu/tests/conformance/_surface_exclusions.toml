# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_gpu::device::GpuDevice::context"
reason = "structural"
note = "Exercised transitively by every module_cache::get_or_compile call."

[[exclusion]]
path = "ferrotorch_gpu::device::GpuDevice::default_stream"
reason = "structural"
note = "Exercised transitively by current_stream_or_default calls in stream tests."

[[exclusion]]
path = "ferrotorch_gpu::device::GpuDevice::blas"
reason = "structural"
note = "CudaBlas accessor; exercised transitively by blas conformance (C8.2)."

[[exclusion]]
path = "ferrotorch_gpu::device::GpuDevice::fork_for_capture"
reason = "deferred"
note = "Requires CUDA graph capture setup; deferred to C8.3 (graph lifecycle)."

