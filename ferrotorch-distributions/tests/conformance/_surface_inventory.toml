# ferrotorch-distributions public surface inventory (Layer 1).
#
# Tracking issue: #859 — ferrotorch-distributions conformance suite.
# Reference: torch == 2.11.0 (torch.distributions)
#
# This file enumerates every public item exported by ferrotorch-distributions.
# It is the "denominator" for the Layer 4 strict surface-coverage gate.
# Regenerate by inspecting ferrotorch-distributions/src/*.rs for `pub` items.
#
# Format: [[item]] entries with:
#   path      — crate-relative qualified path
#   kind      — "fn" | "method" | "type_alias" | "struct" | "enum" | "trait" | "re_export"
#   signature — short human-readable signature (not parsed by the gate)
#
# Items are grouped by distribution family / module.
# Inventory date: 2026-05-07
# Crate: ferrotorch_distributions

crate = "ferrotorch_distributions"
description = "Public API surface of ferrotorch-distributions, sized against torch.distributions."

