# ferrotorch-distributed public surface inventory (Layer 1).
#
# Tracking issue: #882 — ferrotorch-distributed conformance suite.
# Reference: torch.distributed (collective ops, process groups), torch == 2.11.0
#
# This file enumerates every public item exported by ferrotorch-distributed.
# It is the "denominator" for the Layer 4 strict surface-coverage gate.
# Regenerate by inspecting ferrotorch-distributed/src/*.rs for `pub` items.
#
# Inventory date: 2026-05-07
# Crate: ferrotorch-distributed 0.4.7
#
# Format: [[item]] entries with:
#   path      — crate-relative qualified path
#   kind      — "fn" | "method" | "type_alias" | "struct" | "trait" | "enum" | "const" | "re_export"
#   signature — short human-readable signature (not parsed by the gate)

crate = "ferrotorch_distributed"
description = "Public API surface of ferrotorch-distributed, sized against torch.distributed."

