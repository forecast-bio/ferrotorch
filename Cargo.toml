[workspace]
resolver = "3"
members = [
    "ferrotorch",
    "ferrotorch-core",
    "ferrotorch-nn",
    "ferrotorch-nn-derive",
    "ferrotorch-optim",
    "ferrotorch-data",
    "ferrotorch-train",
    "ferrotorch-vision",
    "ferrotorch-jit",
    "ferrotorch-serialize",
    "ferrotorch-gpu",
    "ferrotorch-distributed",
    "ferrotorch-cubecl",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["doll"]
repository = "https://github.com/dollspace-gay/ferrotorch"
homepage = "https://github.com/dollspace-gay/ferrotorch"
keywords = ["deep-learning", "machine-learning", "autograd", "neural-network", "tensor"]
categories = ["science", "mathematics", "algorithms"]

[workspace.dependencies]
# Internal crates
ferrotorch-core = { path = "ferrotorch-core" }
ferrotorch-nn = { path = "ferrotorch-nn" }
ferrotorch-nn-derive = { path = "ferrotorch-nn-derive" }
ferrotorch-optim = { path = "ferrotorch-optim" }
ferrotorch-data = { path = "ferrotorch-data" }
ferrotorch-vision = { path = "ferrotorch-vision" }
ferrotorch-jit = { path = "ferrotorch-jit" }
ferrotorch-serialize = { path = "ferrotorch-serialize" }
ferrotorch-gpu = { path = "ferrotorch-gpu" }
ferrotorch-distributed = { path = "ferrotorch-distributed" }
ferrotorch-train = { path = "ferrotorch-train" }
ferrotorch-cubecl = { path = "ferrotorch-cubecl" }

# ferray ecosystem (path deps for development — switch to registry for release)
ferray-core = { path = "../ferray/ferray-core", features = ["bf16"] }
ferray-ufunc = { path = "../ferray/ferray-ufunc" }
ferray-linalg = { path = "../ferray/ferray-linalg" }
ferray-random = { path = "../ferray/ferray-random" }

# CubeCL portable GPU compute
cubecl = "0.10.0-pre.2"
cubecl-cuda = "0.10.0-pre.2"
cubecl-wgpu = "0.10.0-pre.2"
cubecl-hip = "0.10.0-pre.2"

# Core dependencies
thiserror = "2.0"
rayon = "1.11"
half = "2.4"
num-traits = "0.2"
cudarc = { version = "0.19", features = ["cuda-12080", "cublas"] }
image = "0.25"
safetensors = "0.5"
zip = { version = "2", default-features = false, features = ["deflate"] }
tempfile = "3"
