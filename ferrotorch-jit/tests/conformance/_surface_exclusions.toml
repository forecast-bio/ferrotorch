note = "Accessor only; exercised by AotCompiledModule construction tests in C7.2."

[[exclusion]]
path = "ferrotorch_jit::autotune::AutotuneResult"
reason = "structural"
note = "Result value struct returned by Autotuner::tune. Covered by Autotuner tests in C7.2."

