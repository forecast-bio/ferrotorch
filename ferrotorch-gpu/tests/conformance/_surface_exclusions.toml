# Surface exclusions for ferrotorch-gpu conformance suite.
#
# Each entry records an item from _surface_inventory.toml that does NOT
# require a direct named reference in a conformance_gpu_lifecycle.rs file,
# along with a documented reason.
#
# Valid reasons:
#   structural   — the item is implicitly exercised by every test that uses
#                  the surrounding struct/trait; individual naming adds no signal.
#   implicit     — covered transitively by tests of a higher-level function.
#   live-env     — requires running CUDA hardware; cascade-skipped in CI without GPU.
#   deferred     — confirmed out-of-scope for C8.1; tracked in a follow-up phase.
#   no-cuda      — variant/method only visible under #[cfg(not(feature = "cuda"))];
#                  conformance tests run with cuda enabled so this branch is dead.

# ---------------------------------------------------------------------------
# C8.1 — allocator internal pool types
# BlockPool and AllocatorState are pub(crate); Block is pub but primarily an
# internal data-structure helper. They are exercised transitively by every
# CudaAllocator test. Individual naming adds no extra confidence.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_gpu::allocator::Block::new"
reason = "structural"
note = "Exercised implicitly by CudaAllocator::new and every cache_insert call in conformance_gpu_lifecycle."

[[exclusion]]
path = "ferrotorch_gpu::allocator::Block::is_split"
reason = "structural"
note = "Predicate on Block internals; exercised by block-splitting paths covered via CudaAllocator::cache_find/cache_free."

[[exclusion]]
path = "ferrotorch_gpu::allocator::CudaAllocator::driver_alloc_size"
reason = "structural"
note = "Pure arithmetic wrapper around get_allocation_size(round_size(...)). Exercised by every pool-miss allocation."

[[exclusion]]
path = "ferrotorch_gpu::allocator::CudaAllocator::record_stream_on_block"
reason = "structural"
note = "Stream-tracking accessor called indirectly; covered by pool::record_stream_on_buffer conformance tests."

[[exclusion]]
path = "ferrotorch_gpu::allocator::CudaAllocator::cached_bytes"
reason = "structural"
note = "Delegates to AllocatorState::cached_bytes; implicitly covered by empty_cache/cache_stats tests."

# ---------------------------------------------------------------------------
# C8.1 — buffer internal constructors
# CudaBuffer::new_pooled is pub(crate); alloc_len is pub but is an internal
# accounting detail covered by the pool-reuse transfer tests.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_gpu::buffer::CudaBuffer::alloc_len"
reason = "structural"
note = "Internal accounting field; exercised by pool_reuse transfer tests that verify rounded allocation tracking."

[[exclusion]]
path = "ferrotorch_gpu::buffer::CudaBuffer::inner"
reason = "structural"
note = "Borrow accessor into cudarc CudaSlice; called indirectly by every gpu_to_cpu / kernel-launch path."

[[exclusion]]
path = "ferrotorch_gpu::buffer::CudaBuffer::inner_mut"
reason = "structural"
note = "Mutable borrow accessor; called indirectly by memset_zeros in pool-hit alloc_zeros paths."

# ---------------------------------------------------------------------------
# C8.1 — pool internal / stream-aware variants
# record_stream_on_buffer is #[cfg(feature = "cuda")] only; its behavioral
# contract is subsumed by pool_take_stream / record_stream tests.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_gpu::pool::record_stream_on_buffer"
reason = "structural"
note = "Lower-level variant of record_stream; exercised transitively by stream-aware pool tests."

# ---------------------------------------------------------------------------
# C8.1 — memory_guard hooks and pressure
# MemoryPressureListener is a trait; cannot be named in a test directly —
# only implementations can be tested. The OOM callback (on_oom) requires
# triggering an actual OOM, which is not safe in a shared test environment.
# MemoryWatchdog requires spawning a background thread; covered structurally.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryPressureListener"
reason = "structural"
note = "Trait definition; exercised by add_pressure_listener test that registers a concrete impl."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryGuard::on_oom"
reason = "live-env"
note = "Requires triggering actual driver OOM; unsafe in shared test environment. Tracked in C8.4."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryGuard::add_pressure_listener"
reason = "structural"
note = "Registrar exercised by pressure_listener conformance test."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryGuard::safe_alloc_with_hooks"
reason = "structural"
note = "Hook-aware alloc path exercised by register_hook / safe_alloc_with_hooks conformance test."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryWatchdog::start"
reason = "live-env"
note = "Spawns a background watchdog thread; requires real GPU for meaningful pressure checks. Deferred to C8.4."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryWatchdog::stop"
reason = "live-env"
note = "Pair of start(); deferred with start() to C8.4."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryWatchdog::wait_if_paused"
reason = "live-env"
note = "Requires a running watchdog; deferred to C8.4."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryWatchdog::wait_for_first_check"
reason = "live-env"
note = "Requires a running watchdog; deferred to C8.4."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryGuard::release_reservation"
reason = "structural"
note = "Covered by the reservation lifecycle test (build with reserve_bytes + release)."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryGuard::has_reservation"
reason = "structural"
note = "Predicate for release_reservation; exercised by the same reservation test."

[[exclusion]]
path = "ferrotorch_gpu::memory_guard::MemoryGuardBuilder::reserve_bytes"
reason = "structural"
note = "Builder method exercised by reservation lifecycle test."

