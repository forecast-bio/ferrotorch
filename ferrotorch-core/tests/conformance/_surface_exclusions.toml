# Strict coverage-gate exclusions for the ferrotorch-core conformance suite.
#
# Tracking issue: #759. Phase-2.0 mandate: every `pub` item in ferrotorch-core
# MUST be either (a) referenced from at least one `tests/conformance_*.rs`
# source file, OR (b) listed here with a `reason` and a `tracking_issue` field
# pointing to a filed phase-N.X issue. New `pub` items added without one of
# these two states fail CI. The `tracking_issue` field is non-optional — an
# entry without a follow-up issue is "indefinite deferral" and the gate
# rejects it.
#
# Format: `[[exclusion]]` table-array entries with three required fields:
#   path           — fully qualified item path as written in `_surface.json`
#   reason         — one or more sentences (not a placeholder)
#   tracking_issue — `#NNN` (crosslink convention) or full GitHub URL
#
# Phase 2.0 (this dispatch) covers the `creation.rs` module — its 21 items
# do NOT appear here. Every other module's items appear here, each pointing
# at the phase issue filed for that module:
#
#   #763 — Phase 2.1-elementwise (elementwise & inplace)
#   #772 — Phase 2.10-autograd (autograd internals)
#   #773 — Phase 2.11-flex-attention (flex_attention)
#   #774 — Phase 2.12-masked (masked tensors)
#   #775 — Phase 2.13-bool-int (bool & int tensors)
#   #776 — Phase 2.14-plumbing (plumbing & core types)
#   #764 — Phase 2.2-reduction (reductions & cumulative)
#   #765 — Phase 2.3-shape (shape, indexing, view)
#   #766 — Phase 2.4-linalg (linalg)
#   #767 — Phase 2.5-special-transcendental (activations, transcendental, special)
#   #768 — Phase 2.6-einops-einsum (einops & einsum)
#   #769 — Phase 2.7-fft-complex (FFT, complex, signal)
#   #770 — Phase 2.8-nested-sparse (nested & sparse)
#   #771 — Phase 2.9-quantize-prune (quantize & prune)
#
# Subsequent phases retire entries by replacing them with real conformance tests.

