# Surface inventory for ferrotorch-profiler.
#
# This file lists every public item in the ferrotorch-profiler crate that is
# part of the documented API contract.  It is the Layer-1 denominator for the
# conformance coverage gate (conformance_surface_coverage.rs).
#
# Generated from: manual audit of src/lib.rs, src/event.rs, src/schedule.rs,
# src/profiler.rs, src/report.rs, src/flops.rs, src/cuda_timing.rs.
#
# Items gated on `feature = "cuda"` are tagged with `cfg = "cuda"` and are
# excluded from non-CUDA builds by the coverage gate.
#
# Format: [[item]] table arrays with:
#   path      — fully-qualified item path (used as coverage key in the gate)
#   kind      — "fn" | "struct" | "enum" | "method" | "field" | "variant"
#   signature — human-readable signature (informational only)
#   cfg       — optional; "cuda" means cuda-feature-gated

