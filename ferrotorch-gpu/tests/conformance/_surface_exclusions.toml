# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_gpu::stream::current_stream_or_default"
reason = "structural"
note = "Convenience wrapper; exercised transitively by stream_guard_restores tests."

[[exclusion]]
path = "ferrotorch_gpu::stream::CudaEventWrapper::inner"
reason = "structural"
