reason = "structural"
note = "Covered transitively by state_dict load tests that mutate parameters."

[[exclusion]]
path = "ferrotorch_nn::linear::Linear::state_dict"
reason = "structural"
note = "Covered by state_dict round-trip test in conformance_nn_layers.rs."

[[exclusion]]
path = "ferrotorch_nn::linear::Linear::load_state_dict"
reason = "structural"
note = "Covered by state_dict round-trip test."

[[exclusion]]
path = "ferrotorch_nn::linear::Linear::to_device"
reason = "structural"
note = "CPU no-op path exercised by train/eval tests; CUDA path requires live GPU."

