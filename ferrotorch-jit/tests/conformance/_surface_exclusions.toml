# Surface exclusions for ferrotorch-jit conformance suite.
#
# Each entry records an item from _surface_inventory.toml that does NOT
# require a direct named reference in a conformance_jit_*.rs file, along
# with the documented reason.
#
# Valid reasons:
#   structural   — the item is implicitly exercised by every test that uses
#                  the surrounding struct/trait; individual naming adds no signal.
#   implicit     — covered transitively by tests of a higher-level function
#                  (e.g. a private helper exposed via pub use).
#   live-env     — requires a running GPU or Python environment; gated behind
#                  a feature flag or environment variable.
#   deferred     — confirmed out-of-scope for C7; tracked in a follow-up issue.

# ---------------------------------------------------------------------------
# C7.1 — trace/graph low-level builder helpers
# These exist to support IrGraph construction in tests, not as
# consumer-facing API surface. Every conformance test builds a graph and
# therefore exercises them implicitly.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_jit::graph::IrGraph::alloc_node_id"
reason = "structural"
note = "Internal ID allocator; exercised implicitly by every add_node / add_input call."

[[exclusion]]
path = "ferrotorch_jit::graph::IrGraph::alloc_value_id"
reason = "structural"
note = "Internal ID allocator; exercised implicitly by every add_input / add_constant call."

