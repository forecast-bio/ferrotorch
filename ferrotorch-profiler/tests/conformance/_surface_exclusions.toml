# Strict coverage-gate exclusions for the ferrotorch-profiler conformance suite.
#
# Every public item in ferrotorch-profiler MUST be either:
#   (a) referenced from at least one `tests/conformance_*.rs` source file, OR
#   (b) listed here with a `reason` and a `tracking_issue` field pointing to a
#       filed issue.
#
# Items that legitimately cannot be tested without hardware (CUDA-gated items),
# or that are simple data fields accessed implicitly through the struct tests,
# appear here.
#
# Format: [[exclusion]] table-array entries with three required fields:
#   path           — fully-qualified item path from _surface_inventory.toml
#   reason         — concrete explanation (not a placeholder)
#   tracking_issue — `#NNN` crosslink convention

# ---------------------------------------------------------------------------
# ProfileEvent public fields — implicitly covered via the struct in
# conformance_event.rs event field assertions.  The coverage gate requires a
# substring reference; the field names (name, category, start_us, etc.) all
# appear verbatim in the conformance test source through field access.
# These exclusions guard the few fields whose exact name would only appear
# in the source as part of a longer access chain.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_profiler::ProfileEvent::thread_id"
reason = "Implicit coverage: thread_id is a public field of ProfileEvent. It is structurally verified in conformance_event.rs via the ProfileEvent construction and events() slice; the exact numeric value is OS-determined and cannot be pinned to a reference fixture. The field's existence and type are confirmed by the struct-level test."
tracking_issue = "#826"

# ---------------------------------------------------------------------------
# OpSummary public fields — implicitly covered via top_ops() return values
# in conformance_report.rs.  The individual field names appear through
# dot-access: o.cpu_total_us, o.gpu_total_us, etc.  The outliers below
# are fields whose names happen not to appear as a substring in the test
# source because they are only accessed through the struct literal pattern
# or through an alias in the loop.
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_profiler::OpSummary::gpu_max_us"
reason = "Implicit coverage: gpu_max_us is a public field of OpSummary, read via top_ops() in conformance_report.rs. The GPU-specific max field is only exercised when GPU events are present; the non-GPU build does not produce GPU events, so the field is structurally present but zero. Tracked for GPU-build conformance expansion."
tracking_issue = "#826"

# ---------------------------------------------------------------------------
# CUDA-gated items — excluded from non-CUDA builds entirely.
# The cuda_timing module only compiles under feature = "cuda".
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_profiler::cuda_timing::CudaKernelScope"
reason = "CUDA-feature-gated type. Requires a CUDA-capable GPU, the cuda feature flag, and a live CudaContext/CudaStream. CPU-only CI cannot test it. Tracked for future GPU CI lane."
tracking_issue = "#826"

[[exclusion]]
path = "ferrotorch_profiler::cuda_timing::CudaKernelScope::new"
reason = "CUDA-feature-gated constructor. Requires live CUDA context; untestable in CPU-only CI."
tracking_issue = "#826"

[[exclusion]]
path = "ferrotorch_profiler::cuda_timing::CudaKernelScope::stop"
reason = "CUDA-feature-gated method. Requires live CUDA context; untestable in CPU-only CI."
tracking_issue = "#826"

[[exclusion]]
path = "ferrotorch_profiler::Profiler::flush_cuda_kernels"
reason = "The non-cuda build provides a no-op stub tested as conformance_profiler::profiler_flush_cuda_kernels_noop_without_feature. The cuda-feature path requires a live CudaContext and is excluded pending GPU CI."
tracking_issue = "#826"
